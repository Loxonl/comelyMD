<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>验证分享准入安全中心</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>body { padding-top: 5rem; }</style>
</head>
<body>
  <main class="container">
    <article style="max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
      <hgroup>
        <h2>验证进入许可凭证</h2>
        <h3>（ID: {{.ID}}）当前对应文章部署了一层专属保护墙机制防爬以及阻止未许可者渗透！</h3>
      </hgroup>
      {{if .Error}}<p style="color: var(--del-color); font-weight: bold; background: rgba(255,0,0,0.1); padding: 0.5rem; text-align: center;">{{.Error}}，该通道的尝试被回落制止！若继续错误输试可能面临 IP 清算封锁状态可能。</p>{{end}}
      <form method="POST">
        <label for="pwd">输入从分享源提供的核准四位组合暗指令进入:</label>
        <input type="password" id="pwd" name="pwd" placeholder="例如：k8jI" required style="letter-spacing: 5px; text-align: center;">
        <button type="submit">完成匹配确权并移步文章核心内容源</button>
      </form>
    </article>
  </main>
</body>
</html>
