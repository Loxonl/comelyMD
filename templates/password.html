<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>验证访问 - ComelyMD</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    :root { --font-size: 0.9em; --border-radius: 0.5rem; }
    body { background-color: var(--background-color); font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 80vh; }
    .pwd-card { width: 100%; max-width: 400px; padding: 2.5rem 2rem; border-radius: var(--border-radius); background: var(--card-background-color); border: 1px solid var(--muted-border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
    .pwd-card hgroup h2 { font-size: 1.25rem; text-align: center; margin-bottom: 0.5rem; letter-spacing: -0.5px;}
    .pwd-card hgroup p { font-size: 0.85em; color: var(--muted-color); text-align: center; margin-bottom: 2rem; }
    .error-msg { font-size: 0.85em; color: #d9534f; background: rgba(217,83,79,0.08); padding: 0.6rem; border-radius: 4px; text-align: center; margin-bottom: 1.5rem; border: 1px solid rgba(217,83,79,0.2); }
    input[type="password"] { font-family: "JetBrains Mono", monospace; letter-spacing: 0.5rem; text-align: center; font-size: 1.2rem; padding: 0.75rem; border-radius: var(--border-radius); border-color: var(--muted-border-color); background: rgba(0,0,0,0.02);}
    button { border-radius: var(--border-radius); margin-top: 0.5rem; font-weight: 600; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="pwd-card">
    <hgroup>
      <h2>访问受限</h2>
      <p>便签 ID: <span style="font-family: monospace; background: rgba(0,0,0,0.05); padding: 0.1rem 0.4rem; border-radius: 3px;">{{.ID}}</span> 已启用密码保护</p>
    </hgroup>
    
    {{if .Error}}<div class="error-msg">{{.Error}}</div>{{end}}
    
    <form method="POST" style="margin-bottom: 0;">
      <input type="password" id="pwd" name="pwd" placeholder="输入 4 位访问密码" required maxlength="4" autocomplete="off" autofocus>
      <button type="submit">解锁查看</button>
    </form>
  </div>
</body>
</html>
