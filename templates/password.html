<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>密码验证 — ComelyMD</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/logo-32.png">
  <link rel="apple-touch-icon" href="/static/logo-180.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117; --bg-card: #181a24; --bg-input: #1e2030;
      --text: #e4e5ea; --text-muted: #8b8fa3;
      --border: #2a2d3a; --border-focus: #6366f1;
      --accent: #6366f1; --accent-glow: rgba(99,102,241,0.25);
      --gradient: linear-gradient(135deg, #3b82f6, #6366f1, #a855f7);
      --radius: 12px; --radius-sm: 8px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
    }
    [data-theme="light"] {
      --bg: #f8f9fc; --bg-card: #ffffff; --bg-input: #f0f1f5;
      --text: #1a1c2e; --text-muted: #6b7189; --border: #e2e4ec;
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
    }

    body {
      display: flex; flex-direction: column; min-height: 100vh;
      background: var(--bg); color: var(--text);
      font-family: var(--font); -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    footer { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.8rem; font-family: var(--mono); }

    .lock-card {
      width: 100%; max-width: 380px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem 2rem;
      box-shadow: var(--shadow-lg); text-align: center;
    }
    .lock-icon {
      width: 56px; height: 56px; margin: 0 auto 1.5rem;
      background: var(--gradient); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem; color: #fff;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .lock-card h2 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .lock-card .hint { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.75rem; font-weight: 500; }
    .lock-card .hint code {
      font-family: var(--mono); font-size: 0.82rem;
      background: var(--bg-input); border: 1px solid var(--border);
      padding: 0.1rem 0.4rem; border-radius: 4px;
    }

    .error-msg {
      font-size: 0.88rem; font-weight: 500; color: #ef4444;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      padding: 0.6rem; border-radius: var(--radius-sm);
      margin-bottom: 1.5rem;
    }

    input[type="password"] {
      width: 100%; padding: 0.8rem; text-align: center;
      font-family: var(--mono); font-size: 1.2rem; letter-spacing: 0.5rem;
      background: var(--bg-input); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      outline: none; transition: all 0.2s;
    }
    input[type="password"]:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow); }

    .btn-unlock {
      width: 100%; padding: 0.8rem; margin-top: 1rem; border: none;
      border-radius: var(--radius-sm); background: var(--gradient); color: #fff;
      font-size: 0.95rem; font-weight: 600; font-family: var(--font);
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .btn-unlock:hover { opacity: 0.92; box-shadow: 0 4px 18px var(--accent-glow); transform: translateY(-1px); }

    .theme-toggle {
      position: fixed; bottom: 1.5rem; right: 1.5rem; width: 42px; height: 42px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 1000; font-size: 1rem; outline: none;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--accent); transform: translateY(-2px); }
  </style>
</head>
<body>
  <script>
    const s = localStorage.getItem('comely-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', s);
  </script>

  <button class="theme-toggle" id="themeBtn" title="切换主题"><i class="fa-solid fa-circle-half-stroke"></i></button>

  <main>
    <div class="lock-card">
      <div class="lock-icon"><i class="fa-solid fa-lock"></i></div>
      <h2>加密内容</h2>
      <p class="hint">通道 <code>{{.ID}}</code> 需要密码访问</p>

      {{if .Error}}<div class="error-msg">{{.Error}}</div>{{end}}

      <form method="POST">
        <input type="password" id="pwd" name="pwd" placeholder="····" required maxlength="4" autocomplete="off" autofocus>
        <button type="submit" class="btn-unlock">解锁</button>
      </form>
    </div>
  </main>

  <footer>v1.2.0</footer>

  <script>
    document.getElementById('themeBtn').addEventListener('click', () => {
      const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('comely-theme', t);
    });
  </script>
</body>
</html>
