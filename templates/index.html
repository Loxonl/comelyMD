<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ComelyMD</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    :root {
      --typography-spacing-vertical: 1rem;
      --font-size: 0.9em;
      --h2-font-size: 1.5rem;
      --form-element-spacing-vertical: 0.75rem;
      --form-element-spacing-horizontal: 1rem;
      --border-radius: 0.5rem;
    }
    body { padding-top: 3rem; font-family: system-ui, -apple-system, sans-serif; }
    textarea { height: 42vh; font-family: "JetBrains Mono", monospace; resize: vertical; border-radius: var(--border-radius); box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); margin-bottom: 1.5rem; }
    .config-card { padding: 1.2rem; border: 1px solid var(--muted-border-color); border-radius: var(--border-radius); background: var(--card-background-color); margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); font-size: 0.95em; }
    .config-card label { margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;}
    .config-card select { margin-top: 0.5rem; font-size: 0.9em; padding: 0.5rem; height: auto; }
    hgroup { margin-bottom: 2rem; }
    hgroup p { color: var(--muted-color); font-size: 0.9em; }
    #result { display: none; margin-top: 1rem; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .result-card { border-radius: var(--border-radius); box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 1px solid var(--muted-border-color); overflow: hidden; background: var(--background-color); }
    .result-header { padding: 1rem 1.5rem; background: var(--card-sectionning-background-color); border-bottom: 1px solid var(--muted-border-color); font-weight: 600; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; }
    .pwd-notice { padding: 1rem 1.5rem; background-color: var(--primary); color: var(--primary-inverse); display: flex; align-items: center; justify-content: space-between; font-size: 0.9em; }
    .pwd-notice strong { font-family: monospace; font-size: 1.3em; background: rgba(0,0,0,0.2); padding: 0.2rem 0.6rem; border-radius: 4px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <main class="container" style="max-width: 800px;">
    <hgroup>
      <h2>ComelyMD</h2>
      <p>极简 · 安全 · Markdown 分享板</p>
    </hgroup>
    
    <form id="mdForm">
      <textarea name="markdown" id="markdown" placeholder="在此键入 Markdown 正文..." required></textarea>
      
      <details id="advConfig">
        <summary role="button" class="secondary outline" style="font-size: 0.85em; padding: 0.4rem 1rem; border-radius: var(--border-radius);">选项部署 (展开)</summary>
        <div class="config-card">
          <label><input type="checkbox" id="isBurn" name="is_burn" value="true"> 阅后即焚（单次查阅后永久销毁）</label>
          <label style="margin-top: 0.75rem;"><input type="checkbox" id="withPassword" name="with_password" value="true"> 启用 4 位随机访问密码</label>
          <label style="margin-top: 1rem; flex-direction: column; align-items: flex-start; gap: 0;">
            <span style="color: var(--muted-color); font-size: 0.85em;">自动化过期丢弃时限</span>
            <select id="expireTime" name="expire_time">
              <option value="0" selected>永不过期</option>
              <option value="5m">5 分钟</option>
              <option value="1h">1 小时</option>
              <option value="6h">6 小时</option>
              <option value="24h">24 小时</option>
              <option value="7d">7 天</option>
              <option value="30d">30 天</option>
            </select>
          </label>
        </div>
      </details>
      
      <button type="submit" id="submitBtn" aria-busy="false" style="border-radius: var(--border-radius); font-weight: bold; letter-spacing: 1px;">生成专属链接</button>
    </form>
    
    <div id="result">
      <article class="result-card">
        <div class="result-header">部署成功</div>
        <div id="pwdArea"></div>
        <div class="grid" style="padding: 1.5rem; gap: 1rem;">
          <input type="text" id="shareUrl" readonly style="font-size: 0.9em; margin: 0; font-family: monospace; border-radius: 4px;" />
          <button id="copyBtn" class="secondary" onclick="copyUrl()" style="border-radius: 4px; margin: 0; font-size: 0.9em;">复制链接</button>
        </div>
        <div style="padding: 0 1.5rem 1.5rem; text-align: right;">
          <a href="#" id="viewLink" target="_blank" role="button" class="outline" style="border-radius: 4px; padding: 0.4rem 1.5rem; font-size: 0.8em;">测试访问</a>
        </div>
      </article>
      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="#" onclick="location.reload()" style="font-size: 0.85em; color: var(--muted-color); text-decoration: none; border-bottom: 1px dashed var(--muted-border-color);">创建新便签</a>
      </div>
    </div>
  </main>
  
  <script>
    const form = document.getElementById('mdForm');
    const resultDiv = document.getElementById('result');
    const advConfig = document.getElementById('advConfig');
    const shareUrl = document.getElementById('shareUrl');
    const viewLink = document.getElementById('viewLink');
    const submitBtn = document.getElementById('submitBtn');
    const pwdArea = document.getElementById('pwdArea');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.setAttribute('aria-busy', 'true');
      submitBtn.textContent = '数据交接组装中...';

      const formData = new FormData(form);
      try {
        const response = await fetch('/api/pages', { method: 'POST', body: formData });
        if (!response.ok) {
          alert('云端抛出未处理拦截，检查内容大小或网络联通性。');
        } else {
          const data = await response.json();
          form.style.display = 'none';
          advConfig.style.display = 'none';
          resultDiv.style.display = 'block';
          shareUrl.value = data.url;
          viewLink.href = data.url;
          
          if (data.pwd) {
            pwdArea.innerHTML = `<div class="pwd-notice"><span>当前分享已被机密保护，独立访问秘锁：</span> <strong>${data.pwd}</strong></div>`;
          }
        }
      } catch (error) {
        alert('无法建立有效的联通请求。');
      } finally {
        submitBtn.setAttribute('aria-busy', 'false');
        submitBtn.textContent = '生成专属链接';
      }
    });

    function copyUrl() {
      shareUrl.select();
      document.execCommand('copy');
      const copyBtn = document.getElementById('copyBtn');
      copyBtn.textContent = '已入剪贴板';
      setTimeout(() => copyBtn.textContent = '复制链接', 2000);
    }
  </script>
</body>
</html>
