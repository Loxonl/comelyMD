<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ComelyMD — 极简 Markdown 分享</title>
  <meta name="description" content="ComelyMD - 安全、极简的 Markdown 内容分享工具">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/logo-32.png">
  <link rel="apple-touch-icon" href="/static/logo-180.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg-card: #181a24;
      --bg-input: #1e2030;
      --text: #e4e5ea;
      --text-muted: #8b8fa3;
      --border: #2a2d3a;
      --border-focus: #6366f1;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-glow: rgba(99,102,241,0.25);
      --gradient: linear-gradient(135deg, #3b82f6, #6366f1, #a855f7);
      --radius: 12px;
      --radius-sm: 8px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.25);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
      --toast-bg: #e4e5ea;
      --toast-text: #0f1117;
    }

    [data-theme="light"] {
      --bg: #f8f9fc;
      --bg-card: #ffffff;
      --bg-input: #f0f1f5;
      --text: #1a1c2e;
      --text-muted: #6b7189;
      --border: #e2e4ec;
      --border-focus: #6366f1;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
      --toast-bg: #1a1c2e;
      --toast-text: #f8f9fc;
    }

    body {
      display: flex; flex-direction: column; min-height: 100vh;
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 15px; line-height: 1.6;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 1.5rem 2rem; }
    footer { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.8rem; font-family: var(--mono); letter-spacing: 0.5px; }

    .container { width: 100%; max-width: 720px; }

    /* 品牌头部 */
    .brand-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
    .brand-header img { width: 40px; height: 40px; border-radius: 10px; }
    .brand-header .title { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.03em; }
    .brand-header .subtitle { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; margin-top: 0.1rem; }

    /* 表单区 */
    textarea {
      width: 100%; height: 45vh; padding: 1.25rem;
      background: var(--bg-input); color: var(--text); border: 1px solid var(--border);
      border-radius: var(--radius); font-family: var(--mono); font-size: 0.9rem; line-height: 1.65;
      resize: vertical; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow); }
    textarea::placeholder { color: var(--text-muted); }

    /* 配置面板 */
    .options-panel {
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
      padding: 1rem 1.25rem; margin: 1rem 0 1.5rem;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
    }
    .opt-item { display: flex; align-items: center; gap: 0.45rem; font-size: 0.88rem; color: var(--text); cursor: pointer; user-select: none; font-weight: 500; white-space: nowrap;}
    .opt-item input[type="checkbox"] {
      appearance: none; -webkit-appearance: none; width: 18px; height: 18px;
      border: 2px solid var(--border); border-radius: 4px; cursor: pointer;
      transition: all 0.15s; position: relative; flex-shrink: 0; background: var(--bg-input);
    }
    .opt-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
    .opt-item input[type="checkbox"]:checked::after { content: '✓'; position: absolute; top: -1px; left: 2px; font-size: 13px; color: white; font-weight: 700; }
    .opt-divider { width: 1px; height: 24px; background: var(--border); margin: 0 0.25rem; }
    .opt-select { display: flex; align-items: center; gap: 0.4rem; font-size: 0.88rem; font-weight: 500; }
    .opt-select select {
      background: var(--bg-input); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.3rem 0.5rem; font-size: 0.85rem; font-family: var(--font);
      outline: none; cursor: pointer;
    }

    /* 主按钮 */
    .btn-primary {
      width: 100%; padding: 0.85rem; border: none; border-radius: var(--radius);
      background: var(--gradient); color: #fff; font-size: 0.95rem; font-weight: 600;
      font-family: var(--font); cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .btn-primary:hover { opacity: 0.92; box-shadow: 0 4px 18px var(--accent-glow); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* 结果卡片 */
    #result { display: none; animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .result-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-md);
    }
    .result-card .card-head {
      padding: 1rem 1.5rem; font-weight: 600; font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(168,85,247,0.08));
    }
    .result-card .card-head i { margin-right: 0.5rem; color: var(--accent); }

    .pwd-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1.5rem; cursor: pointer; transition: background 0.2s;
      background: linear-gradient(135deg, #3b82f6, #6366f1, #a855f7); color: #fff; font-size: 0.9rem;
    }
    .pwd-bar:hover { filter: brightness(1.08); }
    .pwd-bar code { font-family: var(--mono); font-size: 1.15rem; background: rgba(0,0,0,0.2); padding: 0.15rem 0.6rem; border-radius: 4px; letter-spacing: 3px; }

    .url-row { padding: 1.25rem 1.5rem; }
    .url-row input {
      width: 100%; padding: 0.7rem 0.9rem; background: var(--bg-input); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--mono); font-size: 0.88rem; outline: none;
    }

    .action-row { display: flex; gap: 0.75rem; padding: 0 1.5rem 1.25rem; flex-wrap: wrap; }
    .btn-action {
      flex: 1; min-width: 120px; padding: 0.65rem; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-input); color: var(--text); font-size: 0.88rem; font-weight: 500;
      font-family: var(--font); cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .btn-action:hover { border-color: var(--accent); color: var(--accent); }
    .btn-action.primary { background: var(--gradient); color: #fff; border: none; }
    .btn-action.primary:hover { opacity: 0.9; }

    .back-link { display: block; text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.88rem; text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* 主题按钮 */
    .theme-toggle {
      position: fixed; bottom: 1.5rem; right: 1.5rem; width: 42px; height: 42px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      box-shadow: var(--shadow-md); z-index: 1000; font-size: 1rem; outline: none;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--accent); transform: translateY(-2px); }

    /* Toast */
    #toast {
      visibility: hidden; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
      background: var(--toast-bg); color: var(--toast-text);
      padding: 0.75rem 1.5rem; border-radius: var(--radius-sm);
      font-size: 0.88rem; font-weight: 500; box-shadow: var(--shadow-lg);
      opacity: 0; transition: opacity 0.3s, bottom 0.3s; z-index: 9999;
    }
    #toast.show { visibility: visible; bottom: 50px; opacity: 1; }

    @media (max-width: 640px) {
      main { padding: 2rem 1rem 1.5rem; }
      .options-panel { flex-direction: column; align-items: flex-start; }
      .opt-divider { display: none; }
    }
  </style>
</head>
<body>
  <script>
    const saved = localStorage.getItem('comely-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', saved);
  </script>

  <button class="theme-toggle" id="themeBtn" title="切换主题"><i class="fa-solid fa-circle-half-stroke"></i></button>

  <main>
    <div class="container">
      <div class="brand-header">
        <img src="/static/logo-192.png" alt="ComelyMD" width="40" height="40">
        <div>
          <div class="title">ComelyMD</div>
          <div class="subtitle">极简 Markdown 分享</div>
        </div>
      </div>

      <form id="mdForm">
        <textarea name="markdown" id="markdown" placeholder="在此粘贴或输入 Markdown 内容…" required></textarea>
        <div class="options-panel">
          <label class="opt-item"><input type="checkbox" id="isBurn" name="is_burn" value="true"> 阅后即焚</label>
          <label class="opt-item"><input type="checkbox" id="withPassword" name="with_password" value="true"> 密码保护</label>
          <span class="opt-divider"></span>
          <div class="opt-select">
            <span style="color:var(--text-muted);">过期:</span>
            <select id="expireTime" name="expire_time">
              <option value="0" selected>永不</option>
              <option value="5m">5 分钟</option>
              <option value="1h">1 小时</option>
              <option value="6h">6 小时</option>
              <option value="24h">24 小时</option>
              <option value="7d">7 天</option>
              <option value="30d">30 天</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">生成分享链接</button>
      </form>

      <div id="result">
        <article class="result-card">
          <div class="card-head"><i class="fa-solid fa-check-circle"></i>分享就绪</div>
          <div id="pwdArea"></div>
          <div class="url-row">
            <input type="text" id="shareUrl" readonly>
          </div>
          <div class="action-row" id="actionBtns">
            <button class="btn-action" onclick="copyOnlyLink()"><i class="fa-regular fa-copy"></i> 复制链接</button>
            <button class="btn-action" onclick="copyFull()" id="btnCopyFull" style="display:none;"><i class="fa-solid fa-link"></i> 复制链接和密码</button>
            <a href="#" id="viewLink" target="_blank" class="btn-action primary"><i class="fa-solid fa-arrow-up-right-from-square"></i> 访问</a>
          </div>
        </article>
        <a href="/" class="back-link">← 回到首页</a>
      </div>
    </div>
  </main>

  <footer>v1.2.0</footer>
  <div id="toast"></div>

  <script>
    document.getElementById('themeBtn').addEventListener('click', () => {
      const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('comely-theme', t);
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'show';
      setTimeout(() => t.className = '', 2500);
    }

    const form = document.getElementById('mdForm');
    const resultDiv = document.getElementById('result');
    const shareUrl = document.getElementById('shareUrl');
    const viewLink = document.getElementById('viewLink');
    const submitBtn = document.getElementById('submitBtn');
    let generatedPwd = '';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true; submitBtn.textContent = '生成中…';
      try {
        const res = await fetch('/api/pages', { method: 'POST', body: new FormData(form) });
        if (!res.ok) { showToast('提交失败: ' + await res.text()); return; }
        const data = await res.json();
        form.style.display = 'none';
        resultDiv.style.display = 'block';
        const url = location.origin + '/p/' + data.id;
        shareUrl.value = url;
        viewLink.href = url;
        generatedPwd = data.pwd || '';
        const pwdArea = document.getElementById('pwdArea');
        const btnFull = document.getElementById('btnCopyFull');
        if (generatedPwd) {
          btnFull.style.display = '';
          pwdArea.innerHTML = `<div class="pwd-bar" onclick="copyPwd()"><div>密码: <code>${generatedPwd}</code> <small>(点击复制)</small></div><i class="fa-regular fa-copy"></i></div>`;
        } else { btnFull.style.display = 'none'; pwdArea.innerHTML = ''; }
      } catch { showToast('网络错误'); }
      finally { submitBtn.disabled = false; submitBtn.textContent = '生成分享链接'; }
    });

    async function clip(text, msg) {
      try { await navigator.clipboard.writeText(text); } catch {
        const t = document.createElement('textarea'); t.value = text;
        document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
      }
      showToast(msg);
    }
    function copyOnlyLink() { clip(shareUrl.value, '✅ 链接已复制'); }
    function copyPwd() { clip(generatedPwd, '✅ 密码已复制'); }
    function copyFull() { clip(`链接: ${shareUrl.value}\n密码: ${generatedPwd}`, '✅ 已复制链接和密码'); }
  </script>
</body>
</html>
