<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>查阅 - ComelyMD</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
  
  <style>
    :root { --font-size: 0.9em; --border-radius: 0.5rem; }
    body { padding-top: 1.5rem; font-family: system-ui, -apple-system, sans-serif; }
    .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--muted-border-color); padding-bottom: 1rem; margin-bottom: 2.5rem; }
    .page-header a { color: var(--primary); text-decoration: none; font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px; }
    .page-meta { font-size: 0.8em; color: var(--muted-color); display: flex; gap: 1rem; align-items:center;}
    .page-meta span.id-box { font-family: monospace; background: var(--muted-border-color); padding: 0.2rem 0.5rem; border-radius: 4px; color: var(--h1-color);}
    .markdown-body { font-size: 1.05em; line-height: 1.7; color: var(--color); margin-bottom: 4rem; word-break: break-word; }
    pre code { border-radius: var(--border-radius); padding: 1.25rem; font-size: 0.9em; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
    article img { max-width: 100%; border-radius: var(--border-radius); display: block; margin: 1.5rem auto; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    .markdown-body blockquote { border-left: 3px solid var(--primary); background: var(--card-background-color); padding: 0.75rem 1.25rem; border-radius: 0 var(--border-radius) var(--border-radius) 0; font-style: italic; color: var(--muted-color); }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 2rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <main class="container" style="max-width: 800px;">
    <div class="page-header">
      <a href="/">ComelyMD</a>
      <div class="page-meta">
        <span class="id-box">{{.ID}}</span>
        <span>{{.CreatedAt.Format "2006/01/02 15:04"}}</span>
      </div>
    </div>
    
    <article class="markdown-body">
      {{.HTML}}
    </article>
  </main>
</body>
</html>
