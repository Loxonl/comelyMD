version: '3.8'

services:
  mdshare:
    # 全盘依赖远端高性能 CI 构建后的封装成品，从官方仓库秒速获取源
    image: ghcr.io/loxonl/comelymd:latest
    container_name: mdshare
    restart: always
    ports:
      - "18080:18080"
    volumes:
      # 持久化防止容器重启导致所有分享数据蒸发
      - ./data:/app/data
    environment:
      - PORT=18080
      - DB_PATH=/app/data/app.db
